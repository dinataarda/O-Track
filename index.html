<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Track | Field App</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #14b8a6;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 400px; }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Header & Header Icons */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header-left { display: flex; flex-direction: column; }
        h1 { font-size: 1.2rem; letter-spacing: -1px; color: var(--accent); margin: 0; font-weight: 900; }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 41, 59, 0.5);
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .btn-header {
            background: none;
            border: none;
            color: #475569;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-header:active { transform: scale(0.85); color: var(--accent); }
        .btn-header.danger:active { color: #ef4444; }

        /* Weather Widget */
        .weather-widget {
            font-size: 10px;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: fit-content;
            transition: opacity 0.3s ease;
        }

        /* Card Utama */
        .main-card {
            background: var(--card);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* Glow background effect di dalem card */
        .main-card::before {
            content: '';
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(20,184,166,0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }
        .main-card > * { position: relative; z-index: 1; }

        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; font-weight: bold;}
        .total-display { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: var(--accent); 
            margin-bottom: 15px; 
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(20, 184, 166, 0.2);
            transition: all 0.3s ease;
        }
        
        /* Setelan Badge */
        .settings-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }
        .setting-badge {
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }
        .setting-badge:active { transform: scale(0.92); background: rgba(20,184,166,0.1); color: var(--accent); border-color: rgba(20,184,166,0.3); }

        /* Input */
        .input-group { position: relative; margin-bottom: 25px; }
        input[type="number"] {
            width: 100%;
            background: rgba(2, 6, 23, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.1);
            border-radius: 18px;
            padding: 18px 45px 18px 15px; 
            color: white;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        input[type="number"]:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.2), inset 0 2px 10px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }
        input[type="number"]::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .btn-clear {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%) scale(0.8);
            background: rgba(239, 68, 68, 0.1);
            border: none;
            color: #ef4444;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex; 
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-clear.show { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); }
        .btn-clear:active { transform: translateY(-50%) scale(0.85); background: #ef4444; color: white; }

        /* Action Buttons */
        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #0d9488 100%);
            color: var(--bg);
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-main::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }
        .btn-main:active { transform: scale(0.95) translateY(2px); box-shadow: 0 4px 10px rgba(20, 184, 166, 0.2); }
        .btn-main:active::after { left: 100%; }

        /* Dashboard Summary */
        .summary-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 1) 0%, rgba(20, 184, 166, 0.1) 100%);
            border: 1px solid rgba(20, 184, 166, 0.2);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .summary-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-body { display: flex; justify-content: space-between; align-items: flex-end; }
        .summary-qty { font-size: 2.2rem; font-weight: 900; color: white; line-height: 1; }
        .summary-qty span { font-size: 12px; font-weight: normal; color: var(--text-dim); margin-left: 4px; text-transform: uppercase;}
        .summary-rp { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
        
        .btn-export {
            background: rgba(20, 184, 166, 0.1);
            color: var(--accent);
            border: 1px solid rgba(20, 184, 166, 0.2);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-export:active { transform: scale(0.9); background: var(--accent); color: var(--bg); }
        .btn-export svg { width: 14px; height: 14px; }

        /* History Section */
        .history-section { margin-top: 35px; }
        .history-item {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-left: 4px solid #334155;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: calc(var(--delay) * 0.1s);
        }
        .history-item:hover { background: rgba(30, 41, 59, 0.8); border-left-color: var(--accent); transform: translateX(4px); }
        .history-item-qty { font-weight: 900; font-size: 1.1rem; color: white; }
        .history-item-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-weight: bold;}
        .history-right { display: flex; align-items: center; gap: 15px; }
        .history-item-total { color: var(--text-dim); font-weight: bold; font-size: 1rem;}
        
        .btn-del-item {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-del-item:active { transform: scale(0.8); background: #ef4444; color: white; }
        .btn-del-item svg { width: 16px; height: 16px; }

        svg { width: 20px; height: 20px; vertical-align: middle; }
        
        /* Modern Toast */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -30px);
            background: white;
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.2);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }
        #toast svg { width: 16px; height: 16px; color: var(--accent); }
    </style>
</head>
<body>

    <div id="toast">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        <span id="toast-msg">DATA TERSIMPAN</span>
    </div>

    <div class="container">
        <header class="animate-fade-up">
            <div class="header-left">
                <h1>O-TRACK <span style="font-size: 10px; font-weight: normal; color: #94a3b8; margin-left: 5px;">v4.0</span></h1>
                <div id="weather" class="weather-widget">📡 Mengecek cuaca...</div>
            </div>
            <div class="header-right">
                <button onclick="triggerRestore()" class="btn-header" title="Restore Data">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </button>
                <button onclick="backupData()" class="btn-header" title="Backup Data">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
                <div style="width: 1px; height: 16px; background: rgba(148, 163, 184, 0.2); margin: 0 2px;"></div>
                <button onclick="clearHistory()" class="btn-header danger" title="Hapus Semua Riwayat">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </header>

        <div class="main-card animate-fade-up delay-1">
            <div class="label">Estimasi Saat Ini</div>
            <div id="display-rp" class="total-display">Rp 0</div>
            
            <div class="settings-row">
                <div id="badge-price" class="setting-badge" onclick="changePrice()">...</div>
                <div id="badge-unit" class="setting-badge" onclick="changeUnit()">...</div>
            </div>

            <div class="input-group">
                <input type="number" id="input-qty" placeholder="0">
                <button id="btn-clear" class="btn-clear" onclick="resetInput()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div id="input-label" class="label" style="margin-top: 12px;">Jumlah...</div>
            </div>

            <button onclick="saveData()" class="btn-main">SIMPAN KE RIWAYAT</button>
        </div>

        <div class="history-section animate-fade-up delay-2" id="history-container">
            </div>

        <input type="file" id="file-restore" accept=".json" style="display: none;" onchange="restoreData(event)">
    </div>

    <script>
        const input = document.getElementById('input-qty');
        const display = document.getElementById('display-rp');
        const container = document.getElementById('history-container');
        const badgePrice = document.getElementById('badge-price');
        const badgeUnit = document.getElementById('badge-unit');
        const inputLabel = document.getElementById('input-label');
        const btnClear = document.getElementById('btn-clear');
        const weatherEl = document.getElementById('weather');
        let toastTimeout;
        
        let currentPrice = parseInt(localStorage.getItem('otrack_price')) || 7200;
        let currentUnit = localStorage.getItem('otrack_unit') || 'Karung';

        updateSettingsDisplay();
        renderHistory();
        initWeather();

        input.addEventListener('input', updateDisplay);

        // --- Cuaca ---
        function initWeather() {
            const cachedWeather = localStorage.getItem('otrack_weather');
            if (cachedWeather) weatherEl.innerHTML = cachedWeather;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                    (err) => { fetchWeather(-6.2088, 106.8456); },
                    { timeout: 5000 }
                );
            } else {
                weatherEl.innerHTML = "❌ GPS Off";
            }
        }

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                let icon = '☁️';
                if (code === 0) icon = '☀️ Cerah';
                else if (code > 0 && code < 4) icon = '⛅ Berawan';
                else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) icon = '🌧️ Hujan';
                else if (code >= 95) icon = '⛈️ Badai';

                const weatherString = `${icon} • ${temp}°C`;
                weatherEl.innerHTML = weatherString;
                localStorage.setItem('otrack_weather', weatherString);
            } catch (error) {
                if(!localStorage.getItem('otrack_weather')) weatherEl.innerHTML = "📡 Offline";
            }
        }

        // --- Setelan ---
        function updateSettingsDisplay() {
            badgePrice.innerHTML = `💵 Rp ${currentPrice.toLocaleString('id-ID')} / ${currentUnit} ✎`;
            badgeUnit.innerHTML = `🏷️ Satuan: ${currentUnit} ✎`;
            inputLabel.innerText = `Jumlah ${currentUnit}`;
        }

        function changePrice() {
            const newPrice = prompt(`Masukkan harga per ${currentUnit} baru:`, currentPrice);
            if (newPrice !== null && newPrice !== "") {
                const parsedPrice = parseInt(newPrice);
                if (!isNaN(parsedPrice) && parsedPrice > 0) {
                    currentPrice = parsedPrice;
                    localStorage.setItem('otrack_price', currentPrice);
                    updateSettingsDisplay();
                    updateDisplay(); 
                } else {
                    alert('Angka nggak valid, Bos!');
                }
            }
        }

        function changeUnit() {
            const newUnit = prompt('Masukkan nama satuan baru (contoh: Kg, Pcs, Dus):', currentUnit);
            if (newUnit !== null && newUnit.trim() !== "") {
                currentUnit = newUnit.trim();
                localStorage.setItem('otrack_unit', currentUnit);
                updateSettingsDisplay();
                renderHistory(); 
            }
        }

        function updateDisplay() {
            const val = parseInt(input.value) || 0;
            display.innerText = formatRp(val * currentPrice);
            
            // Animasi tombol X (tambah/hapus class 'show')
            if (input.value.length > 0) {
                btnClear.classList.add('show');
            } else {
                btnClear.classList.remove('show');
            }
        }

        function resetInput() {
            input.value = '';
            updateDisplay();
            input.focus(); 
        }

        function formatRp(n) {
            return 'Rp ' + n.toLocaleString('id-ID');
        }

        function saveData() {
            const val = parseInt(input.value) || 0;
            if (val <= 0) {
                input.focus(); // getar dikit kalo kosong
                input.style.transform = 'translateX(5px)';
                setTimeout(() => input.style.transform = 'translateX(-5px)', 50);
                setTimeout(() => input.style.transform = 'translateX(0)', 100);
                return;
            }

            const total = val * currentPrice;
            const now = new Date();
            
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            const datetimeStr = `${dateStr} • ${timeStr} WIB`;

            showToast('DATA TERSIMPAN');
            
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            logs.unshift({ val, total, datetime: datetimeStr });
            localStorage.setItem('otrack_offline', JSON.stringify(logs)); 
            
            renderHistory();
            resetInput();
        }

        function deleteItem(index) {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            logs.splice(index, 1);
            localStorage.setItem('otrack_offline', JSON.stringify(logs));
            renderHistory();
        }

        function exportReport(totalQty, totalMoney) {
            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
            
            const text = `*LAPORAN O-TRACK*\nTanggal: ${date}\nJam: ${time} WIB\n\n- Total ${currentUnit}: ${totalQty} ${currentUnit}\n- Total Estimasi: ${formatRp(totalMoney)}\n\n_Generated by O-Track_`;
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast('LAPORAN DISALIN!');
        }

        function renderHistory() {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="label" style="margin-bottom: 12px;">Riwayat Data</div><div class="main-card" style="padding: 20px; box-shadow: none; border: 2px dashed rgba(148, 163, 184, 0.1); background: transparent;"><p style="color:#475569; font-size:12px; margin:0; font-weight: bold;">BELUM ADA DATA HARI INI</p></div>';
                return;
            }

            let totalQty = 0;
            let totalMoney = 0;
            logs.forEach(item => {
                totalQty += item.val;
                totalMoney += item.total;
            });

            let htmlString = `
                <div class="summary-card animate-fade-up">
                    <div class="summary-header">
                        <span>Total Keseluruhan</span>
                        <button onclick="exportReport(${totalQty}, ${totalMoney})" class="btn-export" title="Salin Laporan Akhir">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            SALIN LAPORAN
                        </button>
                    </div>
                    <div class="summary-body">
                        <div class="summary-qty">${totalQty}<span>${currentUnit}</span></div>
                        <div class="summary-rp">${formatRp(totalMoney)}</div>
                    </div>
                </div>
                
                <div class="label animate-fade-up" style="margin-bottom: 12px; margin-top: 25px; animation-delay: 0.1s;">Rincian Riwayat</div>
            `;

            // Staggered animation delay pake inline css variable --delay
            htmlString += logs.map((item, index) => {
                const displayTime = item.datetime ? item.datetime : (item.time ? item.time + ' WIB' : '-');
                // animasi mentok sampe delay 10 item biar ga kelamaan muncul
                const animDelay = index < 10 ? index + 2 : 10; 
                
                return `
                <div class="history-item" style="--delay: ${animDelay};">
                    <div>
                        <div class="history-item-qty">${item.val} <span style="font-size: 11px; font-weight: normal; color: var(--text-dim);">${currentUnit}</span></div>
                        <div class="history-item-time">${displayTime}</div>
                    </div>
                    <div class="history-right">
                        <div class="history-item-total">${formatRp(item.total)}</div>
                        <button onclick="deleteItem(${index})" class="btn-del-item" title="Hapus baris ini">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = htmlString;
        }

        function clearHistory() {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            if(logs.length > 0 && confirm('Hapus semua data riwayat?')) {
                localStorage.removeItem('otrack_offline');
                renderHistory();
            }
        }

        function backupData() {
            const db = {
                price: localStorage.getItem('otrack_price'),
                unit: localStorage.getItem('otrack_unit'),
                history: localStorage.getItem('otrack_offline')
            };
            
            const dataStr = JSON.stringify(db);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const dateStr = new Date().toISOString().slice(0,10);
            const a = document.createElement('a');
            a.href = url;
            a.download = `OTrack_Backup_${dateStr}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            showToast('BACKUP BERHASIL DIUNDUH');
        }

        function triggerRestore() {
            document.getElementById('file-restore').click();
        }

        function restoreData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.price) localStorage.setItem('otrack_price', data.price);
                    if (data.unit) localStorage.setItem('otrack_unit', data.unit);
                    if (data.history) localStorage.setItem('otrack_offline', data.history);
                    
                    currentPrice = parseInt(data.price) || 7200;
                    currentUnit = data.unit || 'Karung';
                    
                    updateSettingsDisplay();
                    renderHistory();
                    showToast('RESTORE BERHASIL');
                    
                } catch (err) {
                    alert('Gagal! File JSON rusak atau tidak valid.');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // Bouncy Toast Notification
        function showToast(msg) {
            const t = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            
            msgEl.innerText = msg;
            t.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { 
                t.classList.remove('show'); 
            }, 2500);
        }
    </script>
</body>
</html>
