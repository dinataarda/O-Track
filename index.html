<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Track | Premium Field App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        :root {
            --bg-base: #09090b; /* Zinc 950 */
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #06b6d4; /* Cyan */
            --accent-glow: rgba(6, 182, 212, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Inter', -apple-system, sans-serif;
        }
        
        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            position: relative;
            z-index: 1;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.7s var(--ease-out) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .header-left h1 { 
            font-size: 1.25rem; 
            letter-spacing: -0.5px; 
            color: var(--text-main); 
            margin: 0; 
            font-weight: 900; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-left h1::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--surface);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-header {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: all 0.2s var(--ease-out);
        }
        .btn-header:hover { background: var(--surface-hover); color: var(--text-main); }
        .btn-header:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .btn-header svg { width: 18px; height: 18px; }

        .weather-widget {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 600;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        /* --- MAIN CARD --- */
        .main-card {
            background: rgba(20, 25, 35, 0.4);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .label { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: var(--text-dim); 
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .total-display { 
            font-size: 2.75rem; 
            font-weight: 900; 
            color: var(--text-main); 
            margin-bottom: 24px; 
            letter-spacing: -1.5px;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        
        .settings-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
        }
        .setting-badge {
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 100px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s var(--ease-out);
            font-weight: 600;
        }
        .setting-badge:hover { background: var(--surface-hover); color: var(--text-main); }
        .setting-badge:active { transform: scale(0.95); border-color: var(--accent); color: var(--accent); }

        /* --- INPUT GROUP --- */
        .input-group { position: relative; margin-bottom: 24px; }
        input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px 50px 20px 20px; 
            color: var(--accent);
            font-size: 2.5rem;
            font-weight: 900;
            text-align: center;
            outline: none;
            transition: all 0.3s var(--ease-out);
            letter-spacing: -1px;
        }
        input[type="number"]::placeholder { color: rgba(148, 163, 184, 0.2); }
        input[type="number"]:focus { 
            border-color: var(--accent); 
            background: rgba(6, 182, 212, 0.03);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1), inset 0 2px 10px rgba(0,0,0,0.2);
        }
        input[type="number"]::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .btn-clear {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%) scale(0.8);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex; 
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s var(--ease-out);
        }
        .btn-clear.show { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); }
        .btn-clear:hover { background: var(--danger-glow); color: var(--danger); border-color: rgba(239,68,68,0.3); }
        .btn-clear:active { transform: translateY(-50%) scale(0.9); }
        .btn-clear svg { width: 16px; height: 16px; }

        /* --- MAIN BUTTON --- */
        .btn-main {
            width: 100%;
            background: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 18px;
            border-radius: var(--radius-md);
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s var(--ease-out);
            box-shadow: 0 10px 20px rgba(255,255,255,0.05);
            margin-top: 8px;
        }
        .btn-main:hover { background: #e2e8f0; transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255,255,255,0.1); }
        .btn-main:active { transform: scale(0.97) translateY(0); box-shadow: 0 5px 10px rgba(255,255,255,0.05); }

        /* --- DASHBOARD SUMMARY (JS Injected) --- */
        .history-section { margin-top: 40px; }
        
        .summary-card {
            background: linear-gradient(145deg, rgba(6, 182, 212, 0.1), transparent);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .summary-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-body { display: flex; justify-content: space-between; align-items: flex-end; }
        .summary-qty { font-size: 2rem; font-weight: 900; color: var(--text-main); line-height: 1; letter-spacing: -1px; }
        .summary-qty span { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); margin-left: 6px; text-transform: uppercase; letter-spacing: 0; }
        .summary-rp { font-size: 1.25rem; font-weight: 800; color: var(--text-main); opacity: 0.9;}
        
        .btn-export {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            transition: all 0.2s var(--ease-out);
        }
        .btn-export:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.2); }
        .btn-export:active { transform: scale(0.95); }
        .btn-export svg { width: 14px; height: 14px; }

        /* --- HISTORY ITEMS (JS Injected) --- */
        .history-item {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            transition: all 0.3s var(--ease-out);
            opacity: 0;
            animation: fadeUp 0.5s var(--ease-out) forwards;
            animation-delay: calc(var(--delay) * 0.05s);
        }
        .history-item:hover { 
            background: var(--surface); 
            border-color: rgba(255,255,255,0.15); 
            transform: translateX(4px); 
        }
        .history-item-qty { font-weight: 800; font-size: 1.1rem; color: var(--text-main); letter-spacing: -0.5px; }
        .history-item-time { font-size: 0.65rem; color: var(--text-dim); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .history-right { display: flex; align-items: center; gap: 16px; }
        .history-item-total { color: var(--accent); font-weight: 700; font-size: 0.95rem; }
        
        .btn-del-item {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 6px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease-out);
        }
        .btn-del-item:hover { background: var(--danger-glow); color: var(--danger); }
        .btn-del-item:active { transform: scale(0.85); }
        .btn-del-item svg { width: 18px; height: 18px; }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translate(-50%, -40px) scale(0.9);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #toast.show {
            transform: translate(-50%, 0) scale(1);
            opacity: 1;
        }
        #toast svg { width: 16px; height: 16px; color: var(--accent); }

        /* Empty state styling fixes */
        .main-card p {
            color: var(--text-dim) !important;
            font-size: 0.75rem !important;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="toast">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        <span id="toast-msg">DATA TERSIMPAN</span>
    </div>

    <div class="container">
        <header class="animate-fade-up">
            <div class="header-left">
                <h1>O-TRACK</h1>
                <div id="weather" class="weather-widget">📡 Mengecek cuaca...</div>
            </div>
            <div class="header-right">
                <button onclick="backupData()" class="btn-header" title="Backup Data">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"></path></svg>
                </button>
                <button onclick="triggerRestore()" class="btn-header" title="Restore Data">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9.75v6.75m0 0l-3-3m3 3l3-3m-8.25 6a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"></path></svg>
                </button>
            </div>
        </header>

        <div class="main-card animate-fade-up delay-1">
            <div class="label">Estimasi Saat Ini</div>
            <div id="display-rp" class="total-display">Rp 0</div>
            
            <div class="settings-row">
                <div id="badge-price" class="setting-badge" onclick="changePrice()">...</div>
                <div id="badge-unit" class="setting-badge" onclick="changeUnit()">...</div>
            </div>

            <div class="input-group">
                <input type="number" id="input-qty" placeholder="0">
                <button id="btn-clear" class="btn-clear" onclick="resetInput()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div id="input-label" class="label" style="margin-top: 16px;">Jumlah...</div>
            </div>

            <button onclick="saveData()" class="btn-main">SIMPAN KE RIWAYAT</button>
        </div>

        <div class="history-section animate-fade-up delay-2" id="history-container">
            </div>

        <input type="file" id="file-restore" accept=".json" style="display: none;" onchange="restoreData(event)">
    </div>

    <script>
        // TIDAK ADA PERUBAHAN LOGIKA DI BAWAH INI
        const input = document.getElementById('input-qty');
        const display = document.getElementById('display-rp');
        const container = document.getElementById('history-container');
        const badgePrice = document.getElementById('badge-price');
        const badgeUnit = document.getElementById('badge-unit');
        const inputLabel = document.getElementById('input-label');
        const btnClear = document.getElementById('btn-clear');
        const weatherEl = document.getElementById('weather');
        let toastTimeout;
        
        let currentPrice = parseInt(localStorage.getItem('otrack_price')) || 7200;
        let currentUnit = localStorage.getItem('otrack_unit') || 'Karung';

        updateSettingsDisplay();
        renderHistory();
        initWeather();

        input.addEventListener('input', updateDisplay);

        function initWeather() {
            const cachedWeather = localStorage.getItem('otrack_weather');
            if (cachedWeather) weatherEl.innerHTML = cachedWeather;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                    (err) => { fetchWeather(-6.2088, 106.8456); },
                    { timeout: 5000 }
                );
            } else {
                weatherEl.innerHTML = "❌ GPS Off";
            }
        }

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                let icon = '☁️';
                if (code === 0) icon = '☀️ Cerah';
                else if (code > 0 && code < 4) icon = '⛅ Berawan';
                else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) icon = '🌧️ Hujan';
                else if (code >= 95) icon = '⛈️ Badai';

                const weatherString = `${icon} • ${temp}°C`;
                weatherEl.innerHTML = weatherString;
                localStorage.setItem('otrack_weather', weatherString);
            } catch (error) {
                if(!localStorage.getItem('otrack_weather')) weatherEl.innerHTML = "📡 Offline";
            }
        }

        function updateSettingsDisplay() {
            badgePrice.innerHTML = `Rp ${currentPrice.toLocaleString('id-ID')} / ${currentUnit}`;
            badgeUnit.innerHTML = `Satuan: ${currentUnit}`;
            inputLabel.innerText = `Jumlah ${currentUnit}`;
        }

        function changePrice() {
            const newPrice = prompt(`Masukkan harga per ${currentUnit} baru:`, currentPrice);
            if (newPrice !== null && newPrice !== "") {
                const parsedPrice = parseInt(newPrice);
                if (!isNaN(parsedPrice) && parsedPrice > 0) {
                    currentPrice = parsedPrice;
                    localStorage.setItem('otrack_price', currentPrice);
                    updateSettingsDisplay();
                    updateDisplay(); 
                } else {
                    alert('Angka nggak valid, Bos!');
                }
            }
        }

        function changeUnit() {
            const newUnit = prompt('Masukkan nama satuan baru (contoh: Kg, Pcs, Dus):', currentUnit);
            if (newUnit !== null && newUnit.trim() !== "") {
                currentUnit = newUnit.trim();
                localStorage.setItem('otrack_unit', currentUnit);
                updateSettingsDisplay();
                renderHistory(); 
            }
        }

        function updateDisplay() {
            const val = parseInt(input.value) || 0;
            display.innerText = formatRp(val * currentPrice);
            
            if (input.value.length > 0) {
                btnClear.classList.add('show');
            } else {
                btnClear.classList.remove('show');
            }
        }

        function resetInput() {
            input.value = '';
            updateDisplay();
            input.focus(); 
        }

        function formatRp(n) {
            return 'Rp ' + n.toLocaleString('id-ID');
        }

        function saveData() {
            const val = parseInt(input.value) || 0;
            if (val <= 0) {
                input.focus(); 
                input.style.transform = 'translateX(5px)';
                setTimeout(() => input.style.transform = 'translateX(-5px)', 50);
                setTimeout(() => input.style.transform = 'translateX(0)', 100);
                return;
            }

            const total = val * currentPrice;
            const now = new Date();
            
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            const datetimeStr = `${dateStr} • ${timeStr} WIB`;

            showToast('DATA TERSIMPAN');
            
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            logs.unshift({ val, total, datetime: datetimeStr });
            localStorage.setItem('otrack_offline', JSON.stringify(logs)); 
            
            renderHistory();
            resetInput();
        }

        function deleteItem(index) {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            logs.splice(index, 1);
            localStorage.setItem('otrack_offline', JSON.stringify(logs));
            renderHistory();
        }

        function exportReport(totalQty, totalMoney) {
            const now = new Date();
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
            
            const text = `*LAPORAN O-TRACK*\nTanggal: ${date}\nJam: ${time} WIB\n\n- Total ${currentUnit}: ${totalQty} ${currentUnit}\n- Total Estimasi: ${formatRp(totalMoney)}\n\n_Generated by O-Track_`;
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast('LAPORAN DISALIN!');
        }

        function renderHistory() {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            
            if (logs.length === 0) {
                container.innerHTML = '<div class="label" style="margin-bottom: 12px;">Riwayat Data</div><div class="main-card" style="padding: 24px; box-shadow: none; border: 1px dashed rgba(255, 255, 255, 0.1); background: transparent;"><p style="margin:0; font-weight: 600;">BELUM ADA DATA HARI INI</p></div>';
                return;
            }

            let totalQty = 0;
            let totalMoney = 0;
            logs.forEach(item => {
                totalQty += item.val;
                totalMoney += item.total;
            });

            let htmlString = `
                <div class="summary-card animate-fade-up">
                    <div class="summary-header">
                        <span>Total Keseluruhan</span>
                        <button onclick="exportReport(${totalQty}, ${totalMoney})" class="btn-export" title="Salin Laporan Akhir">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            SALIN
                        </button>
                    </div>
                    <div class="summary-body">
                        <div class="summary-qty">${totalQty}<span>${currentUnit}</span></div>
                        <div class="summary-rp">${formatRp(totalMoney)}</div>
                    </div>
                </div>
                
                <div class="label animate-fade-up" style="margin-bottom: 16px; margin-top: 32px; animation-delay: 0.1s;">Rincian Riwayat</div>
            `;

            htmlString += logs.map((item, index) => {
                const displayTime = item.datetime ? item.datetime : (item.time ? item.time + ' WIB' : '-');
                const animDelay = index < 10 ? index + 2 : 10; 
                
                return `
                <div class="history-item" style="--delay: ${animDelay};">
                    <div>
                        <div class="history-item-qty">${item.val} <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-dim);">${currentUnit}</span></div>
                        <div class="history-item-time">${displayTime}</div>
                    </div>
                    <div class="history-right">
                        <div class="history-item-total">${formatRp(item.total)}</div>
                        <button onclick="deleteItem(${index})" class="btn-del-item" title="Hapus baris ini">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            container.innerHTML = htmlString;
        }

        function clearHistory() {
            const logs = JSON.parse(localStorage.getItem('otrack_offline') || '[]');
            if(logs.length > 0 && confirm('Hapus semua data riwayat?')) {
                localStorage.removeItem('otrack_offline');
                renderHistory();
            }
        }

        function backupData() {
            const db = {
                price: localStorage.getItem('otrack_price'),
                unit: localStorage.getItem('otrack_unit'),
                history: localStorage.getItem('otrack_offline')
            };
            
            const dataStr = JSON.stringify(db);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const dateStr = new Date().toISOString().slice(0,10);
            const a = document.createElement('a');
            a.href = url;
            a.download = `OTrack_Backup_${dateStr}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            showToast('BACKUP BERHASIL');
        }

        function triggerRestore() {
            document.getElementById('file-restore').click();
        }

        function restoreData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.price) localStorage.setItem('otrack_price', data.price);
                    if (data.unit) localStorage.setItem('otrack_unit', data.unit);
                    if (data.history) localStorage.setItem('otrack_offline', data.history);
                    
                    currentPrice = parseInt(data.price) || 7200;
                    currentUnit = data.unit || 'Karung';
                    
                    updateSettingsDisplay();
                    renderHistory();
                    showToast('RESTORE BERHASIL');
                    
                } catch (err) {
                    alert('Gagal! File JSON rusak atau tidak valid.');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            
            msgEl.innerText = msg;
            t.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { 
                t.classList.remove('show'); 
            }, 2500);
        }
    </script>
</body>
</html>
